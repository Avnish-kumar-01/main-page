<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Register</title>
    <link rel="stylesheet" href="temp.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- Navbar -->
    <div class="first-block">
        <div class="nav">
            <div class="name">
                <div class="logo-img"><img src="daksha3.png" alt=""></div>
                <div class="logo">DAKSHA</div>
            </div>
            
            <div class="nav-links">
                <a href="main.html">Home</a>
                <a href="#">About</a>

        <br><br><br>
        <h2>Welcome</h2>
        <div class="content">
            <p>Create your account and begin your journey</p>
        </div>
    </div>

    <div class="login-container">
        <div class="form">
            <h4>Register Here</h4><br>

            <form id="registerForm">
                <label for="name">Name :</label>
                <input type="text" id="name" placeholder="Enter your name" required><br>

                <label for="email">Email :</label>
                <input type="email" id="email" placeholder="Enter your email" required><br>

                <label for="password">Password :</label>
                <input type="password" id="password" placeholder="Enter password" required><br><br>

                <button type="submit" class="btn2">Register</button>
            </form>

            <p id="message" style="margin-top: 10px; color: red;"></p>

            <p class="link">Already have an account? 
                <a href="login.html">Login</a>
            </p>

            <p class="liw">register with</p>

            <div class="logos">
                <a href="#" class="go"><ion-icon name="logo-facebook"></ion-icon></a>
                <a href="#" class="go"><ion-icon name="logo-twitter"></ion-icon></a>
                <a href="https://in.linkedin.com/in/imsecghaziabad" class="go"><ion-icon name="logo-linkedin"></ion-icon></a>
                <a href="#" class="go"><ion-icon name="logo-instagram"></ion-icon></a>
                <a href="#" class="go"><ion-icon name="logo-discord"></ion-icon></a>
            </div>
        </div>
    </div>

    <footer>
        <div class="conatiner3">
            <div class="col3">
                <p>Copyright team ENCRYPTORS. All rights reserved.</p>
            </div>
        </div>

</body>
