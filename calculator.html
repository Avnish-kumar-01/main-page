<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Calculator</title>
  <link rel="stylesheet" href="calculator.css">
</head>
<body>

  <div class="container">
    <div class="calculator">
      <div class="title">Premium Calculator</div>

      <div class="input-section">
        <input type="text" name="display" id="display" readonly>
      </div>

      <div class="row">
        <input type="button" value="AC" onclick="display.value = ''" class="operator top-btn">
        <input type="button" value="DE" onclick="display.value = display.value.toString().slice(0,-1)" class="operator top-btn">
        <input type="button" value="." onclick="display.value += '.'" class="operator top-btn">
        <input type="button" value="/" onclick="display.value += '/'" class="operator">
      </div>

      <div class="row">
        <input type="button" value="7" onclick="display.value += '7'">
        <input type="button" value="8" onclick="display.value += '8'">
        <input type="button" value="9" onclick="display.value += '9'">
        <input type="button" value="*" onclick="display.value += '*'" class="operator">
      </div>

      <div class="row">
        <input type="button" value="4" onclick="display.value += '4'">
        <input type="button" value="5" onclick="display.value += '5'">
        <input type="button" value="6" onclick="display.value += '6'">
        <input type="button" value="-" onclick="display.value += '-'" class="operator">
      </div>

      <div class="row">
        <input type="button" value="1" onclick="display.value += '1'">
        <input type="button" value="2" onclick="display.value += '2'">
        <input type="button" value="3" onclick="display.value += '3'">
        <input type="button" value="+" onclick="display.value += '+'" class="operator">
      </div>

      <div class="row">
        <input type="button" value="00" onclick="display.value += '00'">
        <input type="button" value="0" onclick="display.value += '0'">
        <input type="button" value="=" class="equal operator" onclick="calculateResult()">
      </div>
    </div>
  </div>

  <script>
    function calculateResult() {
      try {
        display.value = eval(display.value);
      } catch (error) {
        display.value = "Error";
      }
    }
  </script>

</body>
</html>
